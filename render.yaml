services:
  # Backend - FastAPI + SQLite
  - type: web
    name: askonce-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: ASKONCE_CLAUDE_API_KEY
        sync: false  # Manual input required in Render dashboard
      - key: ASKONCE_CLAUDE_MODEL
        value: claude-sonnet-4-20250514
      - key: ASKONCE_DATABASE_URL
        value: sqlite+aiosqlite:///./data/askonce.db
      - key: ASKONCE_UPLOAD_DIR
        value: ./data/uploads
    disk:
      name: askonce-data
      mountPath: /app/data
      sizeGB: 1

  # Frontend - Next.js
  - type: web
    name: askonce-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: askonce-backend
          type: web
          property: url
